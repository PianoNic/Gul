services:
  mock-oauth2-server:
    image: ghcr.io/navikt/mock-oauth2-server:5.0.2
    container_name: gul-mock-oauth2
    ports:
      - "8090:8080"
    environment:
      LOG_LEVEL: "info"
      JSON_CONFIG: >-
        {"interactiveLogin":true,"tokenCallbacks":[{"issuerId":"default","requestMappings":[{"requestParam":"scope","match":"*","claims":{"aud":["gul"]}}]}]}
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/isalive"]
      interval: 2s
      timeout: 1s
      retries: 20
      start_period: 5s
