name: Release

on:
  release:
    types: [published]

jobs:
  sync-version:
    name: Bump application.properties to the release tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump and push directly to main
        id: bump
        run: |
          VERSION="$(printf '%s' "${{ github.event.release.tag_name }}" | sed -E 's/^[^0-9]*//')"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          FILE_VERSION="$(grep -oP '(?<=<version>)[^<]+' application.properties)"
          if [ "$VERSION" = "$FILE_VERSION" ]; then
            echo "application.properties already at $VERSION; nothing to push."
            exit 0
          fi
          sed -i "s|<version>$FILE_VERSION</version>|<version>$VERSION</version>|" application.properties
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add application.properties
          git commit -m "Bump application.properties to $VERSION"
          git push origin HEAD:main

  server:
    name: Build and push multi-arch image
    needs: sync-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Prepare build metadata
        id: prep
        run: |
          echo "repository_lowercase=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./src/Gul.Server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ steps.prep.outputs.repository_lowercase }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=ghcr.io/${{ steps.prep.outputs.repository_lowercase }}:buildcache,mode=max
          build-args: |
            VERSION=${{ needs.sync-version.outputs.version }}
            BUILDKIT_INLINE_CACHE=1
          provenance: false
          sbom: false

  client:
    name: Client ${{ matrix.rid }}
    needs: sync-version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64, linux-x64, linux-arm64, osx-x64, osx-arm64]
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish self-contained single-file CLI and attach to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${{ needs.sync-version.outputs.version }}"
          dotnet publish src/Gul.Client -c Release -r ${{ matrix.rid }} --self-contained \
            -p:PublishSingleFile=true -p:Version="$VERSION" -o out
          case "${{ matrix.rid }}" in
            win-*)
              mv out/gul.exe "gul-${{ matrix.rid }}.exe"
              gh release upload "$TAG" "gul-${{ matrix.rid }}.exe" --clobber
              ;;
            *)
              mv out/gul "gul-${{ matrix.rid }}"
              gh release upload "$TAG" "gul-${{ matrix.rid }}" --clobber
              ;;
          esac
